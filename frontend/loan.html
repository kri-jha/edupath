<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Estimator - EduPath AI</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script>auth.checkAuthAndRedirect();</script>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><a href="dashboard.html" style="color: var(--text-muted); padding-right:15px; border-right: 1px solid var(--glass-border);">← Back</a> &nbsp; <b style="font-size:1.4rem;">Loan Estimator 🏦</b></div>
    </nav>

    <div class="container py-12" style="margin-top: 50px;">
        <div class="grid grid-cols-2 gap-6">
            
            <div class="card">
                <h3 style="font-size:1.8rem; margin-bottom: 20px;">Financial Eligibility</h3>
                <p class="text-muted mb-6">Calculate instantaneous financing offers backed by our banking integration network.</p>
                
                <form id="loanForm" class="mt-4">
                    <div class="mb-4">
                        <label>Total Projected Cost (INR)</label>
                        <input type="number" id="cost" placeholder="e.g. 5000000" style="padding: 16px;" required>
                    </div>
                    <div class="mb-4">
                        <label>Personal Contribution (INR)</label>
                        <input type="number" id="contrib" value="500000" style="padding: 16px;" required>
                    </div>
                    <div class="mb-4">
                        <label>Co-applicant Monthly Income (INR)</label>
                        <input type="number" id="income" value="100000" style="padding: 16px;" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-full mt-6" style="padding:16px; font-size:1.1rem;">Fetch Financing Offers</button>
                </form>
            </div>

            <div class="card" id="resultsCard" style="display:none; flex-direction:column;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3 style="font-size: 1.5rem;">Approval Status</h3>
                    <div id="eligibilityBadge" style="padding:6px 14px; border-radius:8px; font-weight:bold; font-size:0.9em; border:1px solid transparent;"></div>
                </div>
                
                <div style="background: rgba(0,0,0,0.3); padding: 20px; border-radius: 16px; border: 1px solid var(--glass-border); margin-top:20px;">
                    <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:5px;">Estimated Loan Requirement</p>
                    <b id="reqAmount" style="color:var(--secondary); font-size:1.8rem;"></b>
                </div>
                
                <table id="bankTable" style="margin-top: 30px;">
                    <tr>
                        <th>Financial Institution</th>
                        <th>Rate (Secured)</th>
                        <th>Est. EMI (10yr)</th>
                        <th>Proc. Fee</th>
                    </tr>
                </table>

                <button class="btn btn-primary w-full mt-8" id="applyBtn" style="padding: 16px; font-size: 1.1rem; background: linear-gradient(135deg, var(--success), #059669); box-shadow: 0 5px 15px rgba(16,185,129,0.3);">
                    Initiate Unified Application
                </button>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const p = auth.getProfile();
            if(p) {
                document.getElementById("cost").value = p.budget;
            }
        });

        let currentLoanAmount = 0;

        document.getElementById("loanForm").addEventListener("submit", async(e) => {
            e.preventDefault();
            const payload = {
                course_cost: parseFloat(document.getElementById("cost").value),
                own_contribution: parseFloat(document.getElementById("contrib").value),
                income: parseFloat(document.getElementById("income").value)
            };

            const rc = document.getElementById('resultsCard');
            rc.style.display = 'flex';
            rc.style.animation = 'fadeIn 0.6s ease forwards';
            
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "Querying banking partners...";
            btn.disabled = true;

            const res = await api.calcLoan(payload);
            
            btn.innerText = originalText;
            btn.disabled = false;

            currentLoanAmount = res.required_amount;
            
            document.getElementById('reqAmount').innerText = utils.formatCurrency(res.required_amount);
            
            const badge = document.getElementById('eligibilityBadge');
            badge.innerText = res.eligibility;
            
            if(res.eligibility.includes('Not')) {
                badge.style.background = 'rgba(239,68,68,0.1)';
                badge.style.color = 'var(--danger)';
                badge.style.borderColor = 'rgba(239,68,68,0.3)';
            } else if(res.eligibility.includes('Partially')) {
                badge.style.background = 'rgba(245,158,11,0.1)';
                badge.style.color = 'var(--warning)';
                badge.style.borderColor = 'rgba(245,158,11,0.3)';
            } else {
                badge.style.background = 'rgba(16,185,129,0.1)';
                badge.style.color = 'var(--success)';
                badge.style.borderColor = 'rgba(16,185,129,0.3)';
            }

            const table = document.getElementById('bankTable');
            table.innerHTML = `<tr><th>Financial Institution</th><th>Rate (Secured)</th><th>Est. EMI (10yr)</th><th>Proc. Fee</th></tr>`;
            
            res.offers.forEach(o => {
                table.innerHTML += `
                    <tr>
                        <td><b style="color:#f8fafc;">${o.bank}</b></td>
                        <td style="color:var(--success); font-weight:600;">${o.rate}</td>
                        <td style="color:var(--secondary);">${utils.formatCurrency(o.emi)}<span style="font-size:0.8em; color:var(--text-muted);">/mo</span></td>
                        <td style="font-size:0.9em;">${o.fee}</td>
                    </tr>
                `;
            });
        });

        document.getElementById("applyBtn").addEventListener("click", async() => {
            const btn = document.getElementById("applyBtn");
            btn.innerText = "Transmitting securely...";
            btn.disabled = true;
            
            const res = await api.applyLoan({
                student_id: parseInt(auth.getStudentId()),
                loan_amount: currentLoanAmount
            });

            if(res.status === 'success') {
                utils.showToast("Application transmitted to banking partners successfully!");
                btn.innerText = "Secured ✓";
                btn.style.background = "transparent";
                btn.style.border = "2px solid var(--success)";
                btn.style.color = "var(--success)";
                btn.style.boxShadow = "none";
            } else {
                utils.showToast("Error transmitting application. Try again.", "error");
                btn.innerText = "Initiate Unified Application";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
