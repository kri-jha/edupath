<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Estimator - EduPath AI</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script>auth.checkAuthAndRedirect();</script>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: var(--light); font-weight: 600; }
    </style>
</head>
<body style="background:var(--bg);">

    <nav class="navbar" style="background: white; border-bottom: 1px solid #eee;">
        <div class="logo"><a href="dashboard.html">← Dashboard</a> &nbsp; <b style="font-size:1.2rem;">Loan Estimator 🏦</b></div>
    </nav>

    <div class="container py-12" style="margin-top: 70px;">
        <div class="grid grid-cols-2 gap-6">
            
            <div class="card">
                <h3>Calculate Eligibility</h3>
                <form id="loanForm" class="mt-4">
                    <div class="mb-4">
                        <label>Total Course Cost (INR)</label>
                        <input type="number" id="cost" required>
                    </div>
                    <div class="mb-4">
                        <label>Own Contribution (INR)</label>
                        <input type="number" id="contrib" value="500000" required>
                    </div>
                    <div class="mb-4">
                        <label>Co-applicant Monthly Income (INR)</label>
                        <input type="number" id="income" value="100000" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-full">Fetch Offers</button>
                </form>
            </div>

            <div class="card" id="resultsCard" style="display:none; flex-direction:column;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3>Loan Eligibility</h3>
                    <div id="eligibilityBadge" style="padding:5px 10px; border-radius:15px; color:white; font-weight:bold; font-size:0.9em;"></div>
                </div>
                
                <p class="mt-4">Loan Required: <b id="reqAmount" style="color:var(--primary); font-size:1.2rem;"></b></p>
                
                <table id="bankTable">
                    <tr>
                        <th>Bank</th>
                        <th>Rate</th>
                        <th>EMI (10yr)</th>
                        <th>Fee</th>
                    </tr>
                </table>

                <button class="btn btn-primary w-full mt-8" id="applyBtn">Apply for Loan Selected</button>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const p = auth.getProfile();
            if(p) {
                document.getElementById("cost").value = p.budget;
            }
        });

        let currentLoanAmount = 0;

        document.getElementById("loanForm").addEventListener("submit", async(e) => {
            e.preventDefault();
            const payload = {
                course_cost: parseFloat(document.getElementById("cost").value),
                own_contribution: parseFloat(document.getElementById("contrib").value),
                income: parseFloat(document.getElementById("income").value)
            };

            const res = await api.calcLoan(payload);
            currentLoanAmount = res.required_amount;
            
            document.getElementById('resultsCard').style.display = 'flex';
            document.getElementById('reqAmount').innerText = utils.formatCurrency(res.required_amount);
            
            const badge = document.getElementById('eligibilityBadge');
            badge.innerText = res.eligibility;
            if(res.eligibility.includes('Not')) badge.style.background = 'var(--danger)';
            else if(res.eligibility.includes('Partially')) badge.style.background = 'var(--warning)';
            else badge.style.background = 'var(--success)';

            const table = document.getElementById('bankTable');
            table.innerHTML = `<tr><th>Bank</th><th>Rate</th><th>EMI (10yr)</th><th>Fee</th></tr>`;
            
            res.offers.forEach(o => {
                table.innerHTML += `
                    <tr>
                        <td><b>${o.bank}</b></td>
                        <td>${o.rate}</td>
                        <td>${utils.formatCurrency(o.emi)}/mo</td>
                        <td>${o.fee}</td>
                    </tr>
                `;
            });
        });

        document.getElementById("applyBtn").addEventListener("click", async() => {
            const btn = document.getElementById("applyBtn");
            btn.innerText = "Applying...";
            
            const res = await api.applyLoan({
                student_id: parseInt(auth.getStudentId()),
                loan_amount: currentLoanAmount
            });

            if(res.status === 'success') {
                utils.showToast("Application submitted successfully!");
                btn.innerText = "Applied Successfully ✓";
                btn.classList.remove('btn-primary');
                btn.classList.add('btn-outline');
                btn.disabled = true;
            } else {
                utils.showToast("Error submitting application", "error");
                btn.innerText = "Apply for Loan Selected";
            }
        });
    </script>
</body>
</html>
