<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Navigator - EduPath AI</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script>auth.checkAuthAndRedirect();</script>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><a href="dashboard.html" style="color: var(--text-muted); transition: color 0.3s; padding-right:15px; border-right: 1px solid var(--glass-border);">← Back</a> &nbsp; <b style="font-size:1.4rem;">Navigator 🧭</b></div>
    </nav>

    <div class="container py-12" style="margin-top: 50px;">
        <div class="text-center mb-8">
            <h2 style="font-size: 2.5rem; background: linear-gradient(135deg, #fff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">AI University Matches</h2>
            <p class="text-muted mt-4">Calculated in real-time based on your unified academic profile.</p>
        </div>

        <!-- Filters -->
        <div style="display:flex; justify-content:center; gap:15px; margin-bottom:40px; flex-wrap:wrap; background: var(--glass-bg); padding: 15px; border-radius: 20px; border: 1px solid var(--glass-border); width: fit-content; margin-left: auto; margin-right: auto;" id="filters">
            <button class="btn btn-primary" style="padding: 10px 20px;" onclick="loadUniversities('All')">Global</button>
            <button class="btn btn-outline" style="padding: 10px 20px;" onclick="loadUniversities('USA')">USA</button>
            <button class="btn btn-outline" style="padding: 10px 20px;" onclick="loadUniversities('UK')">UK</button>
            <button class="btn btn-outline" style="padding: 10px 20px;" onclick="loadUniversities('Canada')">Canada</button>
            <button class="btn btn-outline" style="padding: 10px 20px;" onclick="loadUniversities('Germany')">Germany</button>
            <button class="btn btn-outline" style="padding: 10px 20px;" onclick="loadUniversities('Australia')">Australia</button>
        </div>

        <div id="loader" class="grid grid-cols-2 gap-6">
            <div class="card skeleton" style="height:250px;"></div>
            <div class="card skeleton" style="height:250px;"></div>
        </div>

        <div id="uniGrid" class="grid grid-cols-2 gap-6" style="display:none;"></div>
    </div>

    <script>
        const profile = auth.getProfile();
        
        async function loadUniversities(filterCountry = 'All') {
            document.getElementById('loader').style.display = 'grid';
            document.getElementById('uniGrid').style.display = 'none';

            // Update active filter button
            document.querySelectorAll('#filters button').forEach(b => {
                if (b.innerText.includes(filterCountry) || (filterCountry === 'All' && b.innerText === 'Global')) {
                    b.className = 'btn btn-primary fade-in';
                    b.style.padding = '10px 20px';
                } else {
                    b.className = 'btn btn-outline';
                    b.style.padding = '10px 20px';
                    b.style.borderColor = 'rgba(255,255,255,0.1)';
                    b.style.color = 'var(--text-muted)';
                }
            });

            const payload = {
                gpa: profile.gpa,
                target_country: filterCountry === 'All' ? 'All' : filterCountry,
                target_course: profile.target_course
            };

            const data = await api.recommendUniversities(payload);
            
            const grid = document.getElementById('uniGrid');
            grid.innerHTML = '';
            
            if(data.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1 / -1; text-align:center; padding: 40px; background: var(--glass-bg); border-radius: 20px; border: 1px solid var(--glass-border);">No universities found for this trajectory.</div>';
            } else {
                data.forEach((u, i) => {
                    const isHigh = u.match_percent >= 80;
                    const isMid = u.match_percent >= 50 && u.match_percent < 80;
                    
                    let bgMatch = isHigh ? 'rgba(16,185,129,0.15)' : (isMid ? 'rgba(245,158,11,0.15)' : 'rgba(239,68,68,0.15)');
                    let borderMatch = isHigh ? 'rgba(16,185,129,0.3)' : (isMid ? 'rgba(245,158,11,0.3)' : 'rgba(239,68,68,0.3)');
                    let colorMatch = isHigh ? 'var(--success)' : (isMid ? 'var(--warning)' : 'var(--danger)');

                    grid.innerHTML += `
                        <div class="card" style="opacity:0; animation: fadeIn 0.6s ease forwards ${i*0.1}s;">
                            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                                <div>
                                    <h3 style="font-size: 1.4rem;">${u.name} <span style="font-size:0.8em; font-weight:normal; color:var(--text-muted);">(${u.country})</span></h3>
                                    <p class="text-muted mt-4" style="font-size:0.95rem;">Rank: <span style="color:#fff;">#${u.ranking}</span> &nbsp;&bull;&nbsp; Rate: <span style="color:#fff;">${u.acceptance_rate}%</span></p>
                                </div>
                                <div style="background:${bgMatch}; color:${colorMatch}; border: 1px solid ${borderMatch}; padding:8px 16px; border-radius:20px; font-weight:bold; font-size:0.95rem; box-shadow: 0 0 15px ${bgMatch};">
                                    ${u.match_percent}% AI Match
                                </div>
                            </div>
                            <p style="margin: 20px 0; color: #cbd5e1; line-height: 1.7;">${u.description}</p>
                            <div style="margin-bottom:20px; font-weight:600; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 12px; display:inline-block;">
                                <span style="color: var(--secondary);">💰 Est. Cost:</span> ${utils.formatCurrency(u.annual_cost_inr)}
                            </div>
                            <div class="flex gap-4">
                                <a href="https://${u.website}" target="_blank" class="btn btn-outline" style="width:100%; border-color: rgba(255,255,255,0.1); color: white;">Visit Institution Website</a>
                            </div>
                        </div>
                    `;
                });
            }

            document.getElementById('loader').style.display = 'none';
            grid.style.display = 'grid';
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadUniversities(profile.target_country || 'All');
        });
    </script>
</body>
</html>
